# =============================================================================
# line_follower — FSM auto-tracking + plan execution
# =============================================================================
# Đọc bởi: line_follower/line_follower/line_follower_node.py
# Xem thêm:
#   docs/21-line-tracking-strategy.md  — strategy selection
#   docs/22-huskylens-integration.md   — HuskyLens config
#   docs/10-plan-authoring.md          — plan JSON/YAML format
#   docs/03-end-to-end-flow.md §4-5    — tracking + cross detection flow
# =============================================================================

# ── Tốc độ cơ bản ────────────────────────────────────────────────────────────

# Tốc độ mặc định khi follow line (Forward). Đơn vị: arbitrary motor unit.
base_speed: 8

# Tốc độ khi rẽ trái/phải (RotateLeft/RotateRight) + strafe Left/Right.
# Trước: 6 < base_speed → sửa chậm khi line lệch. Tăng = sửa nhanh hơn.
turn_speed_left: 7
turn_speed_right: 7

# ── Cross detection ───────────────────────────────────────────────────────────

# Sau khi detect cross (3 zone đều full), robot drive Forward thêm
# crossing_duration giây trước khi chuyển sang follow.
# Chỉ dùng khi KHÔNG có cross_plan (plan-less crossing).
crossing_duration: 3.0

# ── Cross-pre phase (trước khi execute plan action) ───────────────────────────
# Khi detect cross và có cross_plan, FSM vào STATE_CROSS_PRE:
#   Phase 0: Forward cross_pre_forward_duration giây (để robot vượt qua giao cắt)
#   Phase 1: Stop cross_pre_stop_duration giây (bleed momentum trước khi rotate)
#   → Sau đó execute plan action (thường là RotateLeft/RotateRight)

cross_pre_forward_speed: 8
cross_pre_forward_duration: 2.7   # giây — đủ để robot vượt qua giao cắt
cross_pre_stop_duration: 1.0      # giây — dừng để ổn định trước khi rotate

# Nếu true: trong AutoLine, khi detect cross sẽ BỎ pha forward+stop ở trên
# và rotate ngay theo plan. Robot không nhích lên trước khi quay.
# Set false để giữ behavior cũ (nhích lên trước, rồi mới rotate).
cross_pre_skip_in_autoline: true

# ── Rotate-until-line parameters ─────────────────────────────────────────────

# Thời gian tối thiểu rotate trước khi bắt đầu check line reacquire.
# Tránh stop sớm do line sensor nhiễu ngay khi bắt đầu rotate.
rotate_min_duration: 5

# Số channel mid phải active để coi là "centered" (line ở giữa).
rotate_line_mid_min_count: 1

# Số channel side tối đa được phép khi coi là "centered".
# Nếu left/right > 3 thì chưa centered, tiếp tục rotate.
rotate_line_side_max_count: 3

# Nếu true: cho phép dừng rotate khi line xuất hiện ở bên đúng chiều
# (vd RotateRight → dừng khi right_count >= rotate_line_side_min_count).
# Nhanh hơn nhưng ít chính xác hơn strict_center.
rotate_early_stop_on_side: true

# Số channel side tối thiểu để trigger early stop.
rotate_line_side_min_count: 1

# ── Lost-line behavior trong plan ────────────────────────────────────────────

# Khi mất line trong lúc plan đang pending, robot giữ STOP và chờ.
# Sau plan_lost_line_hold_sec, bắt đầu log warning định kỳ.
plan_lost_line_hold_sec: 1.2

# Chu kỳ log warning "LOST LINE during active plan" (giây).
plan_lost_line_warn_period: 0.6

# ── Plan lifecycle ────────────────────────────────────────────────────────────

# Hành vi khi plan hoàn thành tất cả steps:
#   stop   — robot dừng, auto mode tắt
#   follow — robot tiếp tục follow line (không dừng)
plan_end_state: stop

# Nếu true: khi chọn plan, tự động bật auto mode.
# Nếu false: operator phải bật auto mode riêng sau khi chọn plan.
auto_on_plan_select: true

# ── Tracking strategy ─────────────────────────────────────────────────────────
# Xem docs/21-line-tracking-strategy.md để biết chi tiết từng strategy.

tracking:
  # Chọn strategy:
  #   line_sensor — dùng 3-zone line sensor (left/mid/right count)
  #   huskylens   — dùng HuskyLens arrow (tail_offset_x + angle_deg)
  #   hybrid      — ưu tiên huskylens, fallback line_sensor khi invalid
  strategy: huskylens

  # Nếu true: khi strategy trả None (invalid/stale), robot STOP ngay.
  # Nếu false: fallback sang line_sensor (nếu only_huskylens=false).
  strict_mode: true

  # Nếu true: không subscribe /line_sensors/frame, không fallback.
  # Dùng khi chỉ muốn HuskyLens, không cần line sensor.
  only_huskylens: true

  # Frame cũ hơn ngưỡng này bị coi là stale → strategy trả None.
  line_frame_stale_sec: 0.4
  huskylens_frame_stale_sec: 0.6

  # Throttle log warning "strategy invalid" để không spam.
  log_invalid_period: 1.0

# ── Topics ────────────────────────────────────────────────────────────────────

topics:
  line_frame: /line_sensors/frame
  cmd_vel: /motor_cmd
  auto_mode: /auto_mode
  plan_select: /plan_select
  pick_robot: /pick_robot
  plan_status: /plan_status
  plan_callback: /plan_callback

service:
  set_auto_mode: /set_auto_mode

# ── HuskyLens steering parameters ────────────────────────────────────────────
# Xem docs/22-huskylens-integration.md §6 để biết steering decision tree.

huskylens:
  enabled: true
  topic_frame: /huskylens/frame

  # Deadband cho tail_offset_x (pixel). Trong band → Forward.
  # Ngoài band → Left/Right strafe (mecanum).
  # Giảm = sửa sớm hơn khi line lệch ngang (đỡ lệch nhiều mới sửa).
  # Tăng = chống flicker hơn nhưng line lệch xa mới sửa.
  lateral_deadband: 15.0

  # Deadband cho angle_deg. Trong band → Forward.
  # Ngoài band → RotateLeft/RotateRight.
  # Giảm = sửa sớm hơn khi line nghiêng (đỡ lệch nhiều mới sửa).
  heading_deadband: 7.0

  # Hysteresis: khi đã bắt đầu strafe/rotate, giá trị phải tụt vào trong
  # deadband thêm `hysteresis` mới release về Forward. Ngăn flicker quanh mép.
  # Quy tắc: deadband > hysteresis (nếu hysteresis >= deadband sẽ luôn turning).
  lateral_hysteresis: 6.0
  heading_hysteresis: 3.0

  # Khi đang ở một lệnh non-Forward, chặn switch sang lệnh non-Forward khác
  # trong `command_hold_sec` giây. Switch về Forward luôn được phép.
  # Tăng để mượt hơn (đỡ rung), giảm để phản ứng nhanh hơn.
  command_hold_sec: 0.12

  # EMA smoothing trên tail_offset_x và angle_deg để lọc noise frame-to-frame.
  # 0 = tắt smoothing, 1 = dùng raw. Default 0.4 (60% giá trị cũ + 40% mới).
  smoothing_alpha: 0.4

  # Adaptive (proportional) correction speed. Khi độ lệch THẤP (vừa ngoài
  # deadband), dùng tốc độ chậm (min_speed_factor * turn_speed) để chỉnh
  # chuẩn không overshoot. Khi độ lệch CAO (>= full_speed_offset/angle), ramp
  # lên đầy turn_speed để bắt kịp nhanh.
  #   adaptive_speed: bật/tắt
  #   min_speed_factor: 0.45 = 45% turn_speed khi lệch tối thiểu (3/turn_speed=7)
  #   lateral_full_speed_offset: 80 px - lệch tới đây thì full speed
  #   heading_full_speed_angle:  40 deg - lệch tới đây thì full speed
  adaptive_speed: true
  min_speed_factor: 0.45
  lateral_full_speed_offset: 80.0
  heading_full_speed_angle: 40.0

  # Safety timeout cho rotate-until-y_type (giây).
  # Nếu y_type không đạt MID_TO_TOP sau thời gian này, rotate kết thúc.
  y_type_rotate_timeout: 5.0

  # Cross detector dựa trên length-collapse của HuskyLens:
  #   phase 1: line phía trước DÀI (line_length_y > long_length)
  #   phase 2: line phía trước NGẮN đột ngột (line_length_y < short_length)
  #            → CROSS DETECTED
  # Robust với trường hợp y_type nhảy thẳng BOT_TO_TOP -> MID_TO_TOP (bỏ
  # qua BOT_TO_MID phase) khi camera không thấy đủ rõ giai đoạn trung gian.
  # Reset nếu giữa các phase quá `timeout` giây không có update.
  cross_seq_long_length: 150    # px — line được coi là "dài" (phase 1)
  cross_seq_short_length: 75    # px — line được coi là "ngắn" (phase 2, fire)
  cross_seq_timeout: 8.0

# ── Plan alias (keyboard/MQTT digit → plan name) ─────────────────────────────
# Source of truth: robot_common/config/plan_mapping.yaml (plan_keys section).
# The block below is kept as a backwards-compat fallback for installs that
# haven't synced robot_common yet — line_follower_node.py reads
# plan_mapping.yaml first and falls back here only when missing.

plan_alias:
  '0': clear
  '1': a19
  '2': a18
  '3': a17
  '4': a16
  '5': a15
